{% extends "main/base.html" %}

{% block title %}Password Reset Sent{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5 text-center">
                    <h2 class="fw-bold mb-3">Check Your Email</h2>
                    <p class="text-muted mb-4">
                        We’ve emailed you instructions for setting your password.
                        If an account exists with the email you entered, you should receive the message shortly.
                    </p>
                    <a href="{% url 'account:login_view' %}" class="btn btn-primary rounded-pill px-4">
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
