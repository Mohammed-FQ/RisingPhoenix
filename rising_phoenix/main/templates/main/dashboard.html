{% extends 'main/base.html' %}

{% block sidebar %}
<aside class="saaf-sidebar">
    <p class="sidebar-label">My Space</p>

    <button class="sidebar-btn sidebar-btn-active" aria-label="Dashboard">
        <i class="bi bi-grid-1x2-fill"></i>
        <span class="sidebar-active-indicator"></span>
    </button>

    <button class="sidebar-btn" aria-label="My Requests">
        <i class="bi bi-file-text"></i>
        <span class="sidebar-badge sidebar-badge-brown">2</span>
    </button>

    <button class="sidebar-btn" aria-label="Saved">
        <i class="bi bi-bookmark"></i>
        <span class="sidebar-badge sidebar-badge-light">12</span>
    </button>

    <button class="sidebar-btn" aria-label="Messages">
        <i class="bi bi-chat-dots"></i>
    </button>

    <button class="sidebar-btn" aria-label="Following Artisans">
        <i class="bi bi-heart"></i>
    </button>

    <div class="sidebar-divider"></div>

    <button class="sidebar-btn" aria-label="Settings">
        <i class="bi bi-gear"></i>
    </button>

    <button class="sidebar-btn sidebar-btn-new" aria-label="Post New Request">
        <i class="bi bi-plus-lg"></i>
    </button>
</aside>
{% endblock %}

{% block content %}
<section class="py-4 py-md-5">
    <div class="container-lg">
        <div class="saaf-dashboard-card rounded-4 p-4 p-md-5">
            <p class="saaf-eyebrow mb-2">- Dashboard</p>
            <h1 class="saaf-section-title mb-3">Welcome to your workspace</h1>
            <p class="mb-0 text-muted">This page shows your overview, requests, and recommendations in one place.</p>
        </div>
    </div>
</section>
{% endblock %}
