services:
  - type: web
    name: rising-phoenix
    runtime: python
    buildCommand: "pip install -r requirements.txt && python rising_phoenix/manage.py collectstatic --noinput && python rising_phoenix/manage.py migrate"
    startCommand: "gunicorn rising_phoenix.wsgi:application --chdir rising_phoenix"
    envVars:
      - key: EXTERNAL_OR_NOT
        value: "True"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rising-phoenix-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
